<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin LPK Takashi - Secure Login</title>
    <style>
        :root { --jp-red: #bc002d; --dark: #2d3436; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        
        /* Gaya Login (Tetap sesuai permintaan Anda) */
        #login-screen { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); text-align: center; width: 350px; }
        #login-screen h2 { color: var(--jp-red); margin-bottom: 20px; }
        #login-screen input { width: 90%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; text-align: center; }
        #login-screen button { width: 100%; padding: 12px; background: var(--jp-red); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        /* Gaya Dashboard */
        #admin-content { display: none; width: 100%; padding: 20px; }
        .admin-card { max-width: 1100px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .header-section { display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid var(--jp-red); padding-bottom: 15px; margin-bottom: 20px; }
        h1 { color: var(--jp-red); margin: 0; font-size: 20px; text-transform: uppercase; }
        
        .section-box { background: #f8f9fa; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #eee; }
        
        /* PERBAIKAN: Kotak Daftar Siswa agar Rapih (Scrollable) */
        #student-list-tags { 
            display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; 
            max-height: 120px; overflow-y: auto; background: #fff; 
            padding: 10px; border-radius: 8px; border: 1px inset #eee;
        }
        .tag { background: #eee; padding: 4px 10px; border-radius: 15px; font-size: 12px; display: flex; align-items: center; gap: 5px; border: 1px solid #ddd; }

        .manual-entry { background: #fff5f5; border-color: #ffcccc; display: flex; gap: 10px; align-items: center; }
        input, select { padding: 10px; border: 1px solid #ddd; border-radius: 6px; }
        
        .table-container { max-height: 400px; overflow-y: auto; border: 1px solid #eee; border-radius: 8px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: var(--dark); color: white; position: sticky; top: 0; padding: 12px; z-index: 10; }
        td { padding: 12px; border-bottom: 1px solid #eee; text-align: center; font-size: 14px; }
        
        .badge { padding: 5px 10px; border-radius: 4px; font-weight: bold; font-size: 11px; text-transform: uppercase; }
        .hadir { background: #d4edda; color: #155724; }
        .pulang { background: #cce5ff; color: #004085; }
        .sakit { background: #ffeaa7; color: #856404; }
        .izin { background: #d1ecf1; color: #0c5460; }
        .alpa { background: #ffdada; color: #c0392b; }

        .btn-group { display: flex; gap: 10px; justify-content: flex-end; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; }
        .btn-pdf { background: #e74c3c; }
        .btn-excel { background: #27ae60; }
        .btn-del { color: #bc002d; background: none; border: none; font-size: 18px; cursor: pointer; }

        @media print {
            .manual-entry, .filter-section, .btn-group, .btn-del, .section-box, th:last-child, td:last-child { display: none !important; }
            .admin-card { box-shadow: none; padding: 0; }
            .table-container { max-height: none; overflow: visible; }
            body { background: white; display: block; }
        }
    </style>
</head>
<body>

<div id="login-screen">
    <h2>LOGIN ADMIN</h2>
    <p>LPK Takashi Japan</p>
    <input type="password" id="passInput" placeholder="Masukkan Password...">
    <button onclick="checkPassword()">MASUK</button>
</div>

<div id="admin-content">
    <div class="admin-card">
        <div class="header-section">
            <h1>REKAPITULASI ABSENSI LPK TAKASHI</h1>
            <div id="realtime-clock" style="font-weight: bold;"></div>
        </div>

        <div class="section-box">
            <strong>👤 Kelola Daftar Siswa:</strong>
            <div style="display:flex; gap:10px; margin: 10px 0;">
                <input type="text" id="newStudentName" placeholder="Nama Siswa Baru..." style="flex:1">
                <button class="btn" style="background:var(--dark)" onclick="addMasterStudent()">TAMBAH KE DAFTAR</button>
            </div>
            <div id="student-list-tags"></div>
        </div>

        <div class="section-box manual-entry">
            <strong>📝 Input Manual:</strong>
            <input type="text" id="manualName" placeholder="Nama Siswa..." style="flex: 2;">
            <select id="manualStatus">
                <option value="Sakit">Sakit</option>
                <option value="Izin">Izin</option>
                <option value="Alpa">Alpa</option>
            </select>
            <button class="btn" style="background: var(--dark);" onclick="saveManual()">TAMBAHKAN</button>
        </div>

        <div class="section-box" style="display:flex; gap:10px; align-items:center; background:#f0f2f5">
            <strong>🔍 Cari:</strong>
            <input type="text" id="filterName" placeholder="Nama..." onkeyup="refreshTable()">
            <input type="text" id="filterMonth" placeholder="Bulan (Contoh: 03/2026)" onkeyup="refreshTable()">
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Tanggal</th>
                        <th>Nama Siswa</th>
                        <th>Masuk</th>
                        <th>Pulang</th>
                        <th>Status</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="attendanceData"></tbody>
            </table>
        </div>

        <div class="btn-group">
            <button class="btn btn-pdf" onclick="window.print()">📄 CETAK PDF</button>
            <button class="btn btn-excel" onclick="downloadExcel()">📥 DOWNLOAD EXCEL</button>
            <button class="btn" style="background: #636e72;" onclick="logout()">KELUAR</button>
        </div>
    </div>
</div>

<script>
    var passwordBenar = "admin123";

    function checkPassword() {
        var input = document.getElementById('passInput').value;
        if (input === passwordBenar) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('admin-content').style.display = 'block';
            initMasterStudents();
            refreshTable();
        } else { alert("Password Salah!"); }
    }

    function logout() { location.reload(); }

    setInterval(function() {
        var clock = document.getElementById('realtime-clock');
        if(clock) clock.innerText = new Date().toLocaleString('id-ID');
    }, 1000);

    function initMasterStudents() {
        var list = JSON.parse(localStorage.getItem('takashi_siswa_list'));
        if(!list) {
            list = ["AHMAD ABDUL WAHAB","AHMAD MUSOFA","AHMAD OKI RIAN","AHMAD ZAINUDDIN","MARUM DARMA PUTRA","AWALIYAH SUSY","BRILIAN ADHI S","FAJAR NUR RAHMAT","FARIZQI ASNAN FAJAR","GALIH RAHMDAN M","HAIRRARMATULLOH","IBNU HIBBAN","ILYASIN","IQBAL ULIL ALBAB","LUKMAT HIDAYAT","NAJIHA SYAEFATUN N","RAKHMAT SYAIFUL AFIF","RIFQI QOLBU A'INUN","RIZKI ADITYA PUTRA","SRI FATONAH","TASYA APRILIA","TATAG SESAR ARIYANTO","IQBAL AJI PANGESTU","A. NAJIB AL WAHID","MUSTOPA","ZULFA KHUSNA MAABA","AHMAD MUNGAWIN","M. IRHAM RESTU"];
            localStorage.setItem('takashi_siswa_list', JSON.stringify(list));
        }
        renderStudentTags();
    }

    function renderStudentTags() {
        var list = JSON.parse(localStorage.getItem('takashi_siswa_list')) || [];
        var html = "";
        list.forEach((n, i) => {
            html += `<div class="tag">${n} <b style="color:red;cursor:pointer" onclick="deleteMasterStudent(${i})">×</b></div>`;
        });
        document.getElementById('student-list-tags').innerHTML = html;
    }

    function addMasterStudent() {
        var name = document.getElementById('newStudentName').value.toUpperCase();
        if(!name) return;
        var list = JSON.parse(localStorage.getItem('takashi_siswa_list')) || [];
        list.push(name);
        localStorage.setItem('takashi_siswa_list', JSON.stringify(list));
        document.getElementById('newStudentName').value = "";
        renderStudentTags();
    }

    function deleteMasterStudent(i) {
        if(confirm("Hapus siswa dari daftar tetap?")) {
            var list = JSON.parse(localStorage.getItem('takashi_siswa_list'));
            list.splice(i, 1);
            localStorage.setItem('takashi_siswa_list', JSON.stringify(list));
            renderStudentTags();
        }
    }

    function refreshTable() {
        var tbody = document.getElementById('attendanceData');
        var db = JSON.parse(localStorage.getItem('takashi_master_db')) || [];
        var fName = document.getElementById('filterName').value.toLowerCase();
        var fMonth = document.getElementById('filterMonth').value;

        var filtered = db.filter(function(s) {
            return s.name.toLowerCase().includes(fName) && (fMonth ? s.date.includes(fMonth) : true);
        });

        var html = "";
        for (var i = filtered.length - 1; i >= 0; i--) {
            var item = filtered[i];
            html += `<tr>
                <td>${item.date}</td>
                <td style='text-align:left; font-weight:bold;'>${item.name}</td>
                <td style="color:green; font-weight:bold;">${item.in}</td>
                <td style="color:blue; font-weight:bold;">${item.out}</td>
                <td><span class='badge ${item.status.toLowerCase()}'>${item.status}</span></td>
                <td><button class='btn-del' onclick='deleteEntry(${db.indexOf(item)})'>×</button></td>
            </tr>`;
        }
        tbody.innerHTML = html;
    }

    function saveManual() {
        var name = document.getElementById('manualName').value.toUpperCase();
        var status = document.getElementById('manualStatus').value;
        if (!name) { alert("Nama harus diisi!"); return; }
        var db = JSON.parse(localStorage.getItem('takashi_master_db')) || [];
        db.push({
            date: new Date().toLocaleDateString('id-ID'),
            name: name, in: "--:--", out: "--:--", status: status
        });
        localStorage.setItem('takashi_master_db', JSON.stringify(db));
        document.getElementById('manualName').value = "";
        refreshTable();
    }

    function deleteEntry(idx) {
        if (confirm("Hapus data ini?")) {
            var db = JSON.parse(localStorage.getItem('takashi_master_db'));
            db.splice(idx, 1);
            localStorage.setItem('takashi_master_db', JSON.stringify(db));
            refreshTable();
        }
    }

    function downloadExcel() {
        var db = JSON.parse(localStorage.getItem('takashi_master_db')) || [];
        var excelHtml = '<table border="1"><tr><th>Tanggal</th><th>Nama</th><th>Masuk</th><th>Pulang</th><th>Status</th></tr>';
        db.forEach(function(s) { 
            excelHtml += `<tr><td>${s.date}</td><td>${s.name}</td><td>${s.in}</td><td>${s.out}</td><td>${s.status}</td></tr>`; 
        });
        excelHtml += '</table>';
        var blob = new Blob([excelHtml], { type: 'application/vnd.ms-excel' });
        var a = document.createElement('a');
        a.href = window.URL.createObjectURL(blob);
        a.download = "Laporan_Takashi.xls";
        a.click();
    }
</script>
</body>
</html>
